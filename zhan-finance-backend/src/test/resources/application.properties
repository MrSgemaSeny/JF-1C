spring.datasource.url=jdbc:h2:mem:zhan_finance_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
app.jwt.secret=test-secret-test-secret-test-secret-test
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=604800000
app.cors.allowed-origins=http://localhost:5173

# Fix for missing JavaMailSender bean in tests
spring.mail.host=localhost
app.mail.from-address=test@example.com
app.frontend.url=http://localhost:5173

# Disable Redis in tests to avoid connection errors if Redis is down
spring.cache.type=none
