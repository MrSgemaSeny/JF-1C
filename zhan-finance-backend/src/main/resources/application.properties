spring.application.name=zhan-finance-backend
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/zhanfindb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
# spring.h2.console.enabled=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Cache Configuration
spring.cache.type=none
#spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
# spring.data.redis.host=${REDIS_HOST:localhost}
# spring.data.redis.port=${REDIS_PORT:6379}

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=23

spring.sql.init.encoding=UTF-8
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.force-request=true
spring.servlet.encoding.force-response=true

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,https://mrsgemaseny.github.io}
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:604800000}
app.jwt.refresh-token-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:2592000000}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Storage Configuration
app.storage.type=local
app.storage.local.path=${STORAGE_LOCAL_PATH:./uploads}

# Multipart/File Upload Configuration
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Email Configuration (SMTP)
# Replace with actual credentials for production
spring.mail.host=${SMTP_HOST:smtp.example.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.from-address=${MAIL_FROM:no-reply@zhan-finance.com}

# Frontend Integration
app.frontend.url=${FRONTEND_URL:http://localhost:5173/JF-1C}