spring.application.name=zhan-finance-backend
server.port=${SERVER_PORT:8080}

spring.datasource.url=jdbc:postgresql://localhost:5432/zhanfindb
spring.datasource.username=test_user
spring.datasource.password=pass1
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
app.jwt.secret=${JWT_SECRET:change-me-change-me-change-me-change-me}
app.jwt.access-token-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:900000}
app.jwt.refresh-token-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html