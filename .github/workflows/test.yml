name: Backend Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Grant execute permission for gradlew
      run: chmod +x ./zhan-finance-backend/gradlew
      
    - name: Build and run tests with Jacoco
      working-directory: ./zhan-finance-backend
      run: ./gradlew test jacocoTestReport
      
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: jacoco-report
        path: zhan-finance-backend/build/reports/jacoco/test/html/
